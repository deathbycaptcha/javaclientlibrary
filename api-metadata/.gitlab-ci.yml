stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

test_dbc_apis:
  stage: test
  image: python:3.14
  
  before_script:
    - pip install --upgrade pip
    - pip install -r validation/python/tests/requirements.txt
  
  script:
    - pytest validation/python/tests/ -v --tb=short
  
  only:
    - main
    - develop
    - merge_requests
    - schedules
  
  variables:
    # Credentials should be set as CI/CD variables in GitLab project settings
    # Go to: Settings → CI/CD → Variables
    DBC_USERNAME: $DBC_USERNAME
    DBC_PASSWORD: $DBC_PASSWORD
  
  artifacts:
    reports:
      junit: test-results.xml
    when: always
  
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Schedule nightly validation (runs daily at 00:00 UTC)
# Create this schedule in: CI/CD → Schedules
nightly_validation:
  extends: test_dbc_apis
  only:
    - schedules
  allow_failure: false
