name: Java 25 Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-java25:
    name: Java 25 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests (excluding online integration)
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 -Dtest='!Online*IntegrationTest' clean test

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-25
          path: |
            target/surefire-reports/
            target/site/jacoco/
