name: Java LTS Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-java17:
    name: Java 17 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=17 clean test

      - name: Print core coverage
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "Coverage (core): %.2f%%\n", pct }' target/site/jacoco/jacoco.csv
          else
            echo "Coverage (core): N/A (jacoco.csv not found)"
          fi

      - name: Write coverage summary
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            CORE_COVERAGE=$(awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "%.2f", pct }' target/site/jacoco/jacoco.csv)
            {
              echo "### Java 17"
              echo "- Coverage (core): ${CORE_COVERAGE}%"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Java 17"
              echo "- Coverage (core): N/A"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-17
          path: |
            target/surefire-reports/
            target/site/jacoco/

  test-java21:
    name: Java 21 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=21 clean test

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-21
          path: |
            target/surefire-reports/
            target/site/jacoco/

  test-java25:
    name: Java 25 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 clean test

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-25
          path: |
            target/surefire-reports/
            target/site/jacoco/

  coverage:
    name: Code Coverage (Java 25)
    runs-on: ubuntu-latest
    needs: [test-java17, test-java21, test-java25]
    permissions:
      contents: write
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests with coverage
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 clean test

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "%.0f", pct }' target/site/jacoco/jacoco.csv)
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Create coverage badge
        run: |
          mkdir -p .coverage
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 70 ]; then
            COLOR="green"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellowgreen"
          elif [ "$COVERAGE" -ge 50 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          cat > .coverage/badge.json << EOF
          {"schemaVersion": 1, "label": "coverage", "message": "${COVERAGE}%", "color": "${COLOR}"}
          EOF

      - name: Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update coverage badge: ${{ steps.coverage.outputs.percentage }}%"
          file_pattern: .coverage/badge.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
            .coverage/badge.json

  integration-tests:
    name: Integration Tests (Java 25)
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run integration tests
        id: integration
        run: |
          mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 -Dtest=Online*IntegrationTest test || EXIT_CODE=$?
          echo "result=${EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create integration badge
        if: always()
        run: |
          mkdir -p .badges/integration
          EXIT_CODE=${{ steps.integration.outputs.result }}

          if [ "$EXIT_CODE" == "0" ]; then
            MESSAGE="passing"
            COLOR="brightgreen"
          else
            MESSAGE="failing"
            COLOR="red"
          fi

          cat > .badges/integration/badge.json << EOF
          {
            "schemaVersion": 1,
            "label": "integration tests",
            "message": "$MESSAGE",
            "color": "$COLOR"
          }
          EOF

      - name: Commit integration badge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update integration test badge"
          file_pattern: .badges/integration/badge.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/surefire-reports/

  badges:
    name: Generate Test Badges
    needs: [test-java17, test-java21, test-java25]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate badge metadata
        run: |
          mkdir -p .badges/java17 .badges/java21 .badges/java25

          create_badge() {
            local status=$1
            local label=$2
            local path=$3

            if [[ "$status" == "success" ]]; then
              MESSAGE="passing"
              COLOR="brightgreen"
            elif [[ "$status" == "skipped" ]]; then
              MESSAGE="skipped"
              COLOR="inactive"
            else
              MESSAGE="failing"
              COLOR="red"
            fi

            cat > "$path/badge.json" << EOF
          {
            "schemaVersion": 1,
            "label": "$label",
            "message": "$MESSAGE",
            "color": "$COLOR"
          }
          EOF
          }

          create_badge "${{ needs.test-java17.result }}" "Java 17" ".badges/java17"
          create_badge "${{ needs.test-java21.result }}" "Java 21" ".badges/java21"
          create_badge "${{ needs.test-java25.result }}" "Java 25" ".badges/java25"

      - name: Commit badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update test status badges"
          file_pattern: .badges/**/badge.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
