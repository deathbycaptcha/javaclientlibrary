name: Integration API Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  integration-tests:
    name: Integration API Tests (Java 25)
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run integration API tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 -Dtest=OnlineGitBasicApiIntegrationTest test

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-api-test-results
          path: target/surefire-reports/
