openapi: 3.0.3
info:
  title: DeathByCaptcha HTTP API (spec)
  version: "1.0.0"
  description: |
    OpenAPI specification for DeathByCaptcha HTTP API.  This file is
    intentionally crafted for use by AI agents and automated tooling;
    it describes the live service in a language-agnostic format so that
    clients can be generated or reasoned about in any programming
    language.  The contents track the public API at https://deathbycaptcha.com/api
    and are the canonical metadata for this repository.

    **Security Note:** Use HTTPS (primary server) whenever possible since
    authentication credentials are sent in requests. HTTP is provided as
    a fallback for legacy systems only.
servers:
  - url: https://api.dbcapi.me/api
    description: Production API (HTTPS recommended for security)
  - url: http://api.dbcapi.me/api
    description: HTTP fallback (legacy, not recommended)
paths:
  /:
    get:
      summary: Get user account details (credit balance)
      parameters:
        - name: username
          in: query
          required: false
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
        - name: authtoken
          in: query
          required: false
          schema:
            type: string
      description: |
        Official docs describe balance lookup as GET to `/api` with either
        `username`+`password` or `authtoken`.
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    post:
      summary: Get user account details (credit balance)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                authtoken:
                  type: string
              oneOf:
                - required: [username, password]
                - required: [authtoken]
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /captcha:
    post:
      summary: Upload a captcha (image / token / coordinates / image group)
      description: |
        Upload a captcha using multipart/form-data (file in `captchafile`) or
        by providing base64 content in the `captcha` field. Use `type` to
        specify specialized APIs: 2=Coordinates, 3=Image Group, 4=Token, 5=reCAPTCHA v3
        (see below for a full list of types up to 25).  **All types share the
        same response structure:** the server always returns a JSON object
        conforming to `CaptchaResponse` containing at minimum a `captcha` id
        and `status`.  Clients are expected to poll `/captcha/{id}` to check for
        completion; until solved the `text` field will be empty or null and
        `is_correct` is false.  A reply with HTTP 501 indicates missing
        parameters or an unsupported combination of type/fields; this should be
        treated as a hard error rather than a solvable captcha.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: |
                Common parameters for captcha uploads.  Additional fields are
                allowed depending on the captcha `type` value.  Below is a
                mapping of `type` values to the extra form-fields or JSON
                sub‑objects that the server expects (derived from the
                official examples and client library):

                * **0** – normal image, no extra fields other than
                  `captchafile` or `captcha`
                * **2** – reCAPTCHA coordinates (legacy), supply screenshot
                  via `captchafile`
                * **3** – reCAPTCHA image group, requires `banner` and
                  `banner_text` (and optionally `grid`); multiple files may
                  be posted as `captchafile`
                * **4** – token APIs (v2), use `token_params` JSON including
                  fields such as `googlekey`, `pageurl`, `proxy`, etc.
                * **5** – reCAPTCHA v3, same `token_params` plus `action` and
                  `min_score`
                * **8**/**9** – Geetest v3/v4, provide `geetest_params`
                  (provider-specific JSON payload)
                * **11** – Textcaptcha, include `textcaptcha` with the
                  question string
                * **12** – Cloudflare Turnstile, use `turnstile_params`
                * **13** – Audio CAPTCHA, send `audio` (base64) and
                  `language`
                * **14** – Lemin (`lemin_params`)
                * **15** – Capy (`capy_params`)
                * **16** – Amazon WAF (`waf_params`)
                * **17** – Siara (`siara_params`)
                * **18** – Mtcaptcha (`mtcaptcha_params`)
                * **19** – Cutcaptcha (`cutcaptcha_params`)
                * **20** – Friendly Captcha (`friendly_params`)
                * **21** – Datadome (`datadome_params`)
                * **23** – Tencent (`tencent_params`)
                * **24** – ATB (`atb_params`)
                * **25** – reCAPTCHA v2 Enterprise (`token_enterprise_params`)

                If the provided parameters do not satisfy the requirements for
                the chosen `type`, the server will respond with HTTP 501 Not
                Implemented or an error message (see ErrorResponse).  Validators
                should treat such responses as failures rather than warnings.
              additionalProperties: true
              properties:
                username:
                  type: string
                password:
                  type: string
                authtoken:
                  type: string
                captchafile:
                  type: string
                  format: binary
                captcha:
                  type: string
                  description: Base64-encoded image payload (alternate to `captchafile`)
                banner:
                  type: string
                  description: Optional banner image (file)
                banner_text:
                  type: string
                type:
                  type: integer
                  description: API type selector (2=Coordinates,3=ImageGroup (requires banner+banner_text; see https://deathbycaptcha.com/api/recaptcha-legacymethod),4=Token,5=reCAPTCHA v3,
                    8=Geetest v3,9=Geetest v4,11=Textcaptcha,12=Turnstile,13=Audio,
                    14=Lemin,15=Capy,16=AmazonWaf,17=Siara,18=Mtcaptcha,19=Cutcaptcha,
                    20=Friendly,21=Datadome,23=Tencent,24=Atb,25=reCAPTCHA v2 enterprise)
                grid:
                  type: string
                  description: Optional grid spec (e.g. "2x4")
                token_params:
                  type: string
                  description: JSON string with parameters for token APIs (proxy, proxytype, googlekey, pageurl, action, min_score)
                geetest_params:
                  type: string
                  description: JSON string with provider-specific parameters for Geetest (v3/v4)
                textcaptcha:
                  type: string
                  description: Question text for textcaptcha
                turnstile_params:
                  type: string
                  description: JSON string with parameters for Cloudflare Turnstile
                audio:
                  type: string
                  description: Base64 audio for audio captchas
                language:
                  type: string
                  description: Language code for audio captchas
                lemin_params:
                  type: string
                  description: JSON string with parameters for Lemin captchas
                capy_params:
                  type: string
                  description: JSON string with parameters for Capy captchas
                waf_params:
                  type: string
                  description: JSON string with parameters for Amazon WAF captchas
                siara_params:
                  type: string
                  description: JSON string with parameters for Siara captchas
                mtcaptcha_params:
                  type: string
                  description: JSON string with parameters for Mtcaptcha captchas
                cutcaptcha_params:
                  type: string
                  description: JSON string with parameters for Cutcaptcha captchas
                friendly_params:
                  type: string
                  description: JSON string with parameters for Friendly captchas
                datadome_params:
                  type: string
                  description: JSON string with parameters for Datadome captchas
                tencent_params:
                  type: string
                  description: JSON string with parameters for Tencent captchas
                atb_params:
                  type: string
                  description: JSON string with parameters for ATB captchas
                token_enterprise_params:
                  type: string
                  description: JSON string with parameters for reCAPTCHA v2 Enterprise tokens
      responses:
        '200':
          description: Upload response (JSON clients may follow redirects and observe 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
        '303':
          description: See Other. Official upload success status; Location header points to `/captcha/{id}`.
        '400':
          description: Bad request (invalid parameters or invalid image)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (invalid credentials or insufficient balance)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not implemented (missing or unsupported captcha type/parameters). Clients should supply correct parameters according to the type or consult API documentation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable (overloaded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /captcha/{captchaId}:
    get:
      summary: Get captcha status/result
      parameters:
        - name: captchaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Captcha details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
  /captcha/{captchaId}/report:
    post:
      summary: Report an incorrectly solved captcha
      description: |
        Report a captcha as incorrectly solved. After reporting, the captcha's
        `is_correct` field will be set to false. Requires authentication via
        username/password or authtoken.
      parameters:
        - name: captchaId
          in: path
          required: true
          schema:
            type: integer
            description: The captcha ID to report
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              description: Authentication is required (same as for root `/` balance endpoint)
              properties:
                username:
                  type: string
                password:
                  type: string
                authtoken:
                  type: string
              oneOf:
                - required: [username, password]
                - required: [authtoken]
      responses:
        '200':
          description: Report result (returns captcha details with is_correct set to false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable (report rejected, e.g. invalid ownership, banned user, or too late)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /status:
    get:
      summary: Retrieve current server status
      description: |
        Query the API for operational metrics.  Returned fields mirror the
        official documentation at https://deathbycaptcha.com/api#api_details.
      responses:
        '200':
          description: Server status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
components:
  schemas:
    UserResponse:
      type: object
      properties:
        user:
          type: integer
          description: User ID
        rate:
          type: number
          description: Charge per correctly solved CAPTCHA (official docs describe this in US cents)
        balance:
          type: number
          description: Account balance (official docs describe this in US cents)
        is_banned:
          type: boolean
          description: Whether the account is banned
        status:
          type: integer
          description: HTTP status code (0 for success)
    CaptchaResponse:
      type: object
      properties:
        captcha:
          type: integer
          description: Captcha ID
        text:
          type: string
          description: Solution text (empty string if not yet solved, or for types where solution is empty)
          nullable: true
        is_correct:
          type: boolean
          description: Whether the captcha was solved correctly (true/false)
        status:
          type: integer
          description: HTTP status code (0 for success)
    ServerStatus:
      type: object
      properties:
        status:
          type: integer
          description: 0 when server is healthy (non-zero codes indicate issues)
        todays_accuracy:
          type: number
          description: Percentage accuracy for the current day (e.g. 99.6)
        solved_in:
          type: number
          description: Average solving time in seconds
        is_service_overloaded:
          type: boolean
          description: True when the service is currently overloaded
    ErrorResponse:
      type: object
      description: |
        Generic error structure. The `error` field may contain messages such as
        "not-implemented" (HTTP 501) or other validation errors. A 501 status
        typically indicates that the requested captcha type or parameters are
        not supported by the server or require additional fields (see docs).
      properties:
        error:
          type: string
    TokenParams:
      type: object
      description: Parameters for token-based APIs (reCAPTCHA token requests)
      properties:
        proxy:
          type: string
          description: Proxy URL (optional but recommended)
          example: "http://user:pass@127.0.0.1:3128"
        proxytype:
          type: string
          description: Proxy type (HTTP, HTTPS, SOCKS4, SOCKS5)
          example: "HTTP"
    GeetestParams:
      type: object
      description: Provider-specific configuration for Geetest v3/v4.
    TextcaptchaParams:
      type: object
      description: String payload for textcaptcha questions.
      properties:
        textcaptcha:
          type: string
    TurnstileParams:
      type: object
      description: Cloudflare Turnstile JSON payload.
    AudioParams:
      type: object
      description: Audio/original data for audio CAPTCHAs; base64 encoded
      properties:
        audio:
          type: string
        language:
          type: string
    LeminParams:
      type: object
      description: Lemin-specific payload
    CapyParams:
      type: object
      description: Capy-specific payload
    WafParams:
      type: object
      description: Amazon WAF-specific payload
    SiaraParams:
      type: object
      description: Siara-specific payload
    MtcaptchaParams:
      type: object
      description: Mtcaptcha-specific payload
    CutcaptchaParams:
      type: object
      description: Cutcaptcha-specific payload
    FriendlyParams:
      type: object
      description: Friendly Captcha-specific payload
    DatadomeParams:
      type: object
      description: Datadome-specific payload
    TencentParams:
      type: object
      description: Tencent-specific payload
    AtbParams:
      type: object
      description: ATB-specific payload
    TokenEnterpriseParams:
      type: object
      description: reCAPTCHA v2 Enterprise token payload
      properties:
        proxytype:
          type: string
          description: Proxy type (HTTP, HTTPS, SOCKS4, SOCKS5)
          example: "HTTP"
        googlekey:
          type: string
          description: The sitekey (google recaptcha key)
          example: "6Le-wvkSAAAAAPBMRTvw0Q4Muexq9bi0DJwx_mJ-"
        pageurl:
          type: string
          description: URL of the page that contains the recaptcha
          example: "http://test.com/path_with_recaptcha"
        action:
          type: string
          description: (reCAPTCHA v3) action name
          example: "login"
        min_score:
          type: number
          description: (reCAPTCHA v3) minimal accepted score
          example: 0.3
  examples:
    UserExample:
      summary: Example user response
      value:
        user: 12345
        rate: 10
        balance: 250
        is_banned: false
    CaptchaPending:
      summary: Example pending captcha response
      value:
        captcha: 98765
        text: null
        is_correct: 0
    CaptchaSolved:
      summary: Example solved captcha response
      value:
        captcha: 98765
        text: "SAMPLE-SOLUTION"
        is_correct: 1
    UploadExampleMultipart:
      summary: Example multipart/form-data upload (fields shown)
      value:
        username: "your_user"
        password: "your_pass"
        type: 0
        captchafile: "(binary image file)"
    UploadExampleToken:
      summary: Example token_params upload (reCAPTCHA token API)
      value:
        username: "your_user"
        password: "your_pass"
        type: 4
        token_params: |
          {"proxy":"http://127.0.0.1:3128","proxytype":"HTTP","googlekey":"6Le-wvkSAAAA...","pageurl":"http://test.com/path_with_recaptcha"}
    UploadExampleAudio:
      summary: Example audio captcha upload
      value:
        username: "your_user"
        password: "your_pass"
        type: 13
        audio: "<base64-audio>"
        language: "en"
    UploadExampleGeetest4:
      summary: Example Geetest v4 upload
      value:
        username: "your_user"
        password: "your_pass"
        type: 9
        geetest_params: |
          {"proxy":"http://127.0.0.1:3128","captcha_id":"...","pageurl":"https://example.com"}
    UploadExampleTextcaptcha:
      summary: Example Textcaptcha upload
      value:
        username: "your_user"
        password: "your_pass"
        type: 11
        textcaptcha: "Please solve the math problem"
    UploadExampleTokenEnterprise:
      summary: Example reCAPTCHA v2 enterprise upload
      value:
        username: "your_user"
        password: "your_pass"
        type: 25
        token_enterprise_params: |
          {"proxy":"http://127.0.0.1:3128","googlekey":"...","pageurl":"https://example.org"}
