name: Java LTS Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-java17:
    name: Java 17 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=17 clean test

      - name: Print core coverage
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "Coverage (core): %.2f%%\n", pct }' target/site/jacoco/jacoco.csv
          else
            echo "Coverage (core): N/A (jacoco.csv not found)"
          fi

      - name: Write coverage summary
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            CORE_COVERAGE=$(awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "%.2f", pct }' target/site/jacoco/jacoco.csv)
            {
              echo "### Java 17"
              echo "- Coverage (core): ${CORE_COVERAGE}%"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Java 17"
              echo "- Coverage (core): N/A"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-17
          path: |
            target/surefire-reports/
            target/site/jacoco/

  test-java21:
    name: Java 21 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=21 clean test

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-21
          path: |
            target/surefire-reports/
            target/site/jacoco/

  test-java25:
    name: Java 25 LTS Tests
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 clean test

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-25
          path: |
            target/surefire-reports/
            target/site/jacoco/

  coverage:
    name: Code Coverage (Java 25)
    runs-on: ubuntu-latest
    needs: [test-java17, test-java21, test-java25]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests with coverage
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 clean test

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(awk -F',' 'NR>1 && $2 == "com.DeathByCaptcha" { missed += $4; covered += $5 } END { total = missed + covered; pct = (total > 0 ? (covered * 100.0 / total) : 0); printf "%.0f", pct }' target/site/jacoco/jacoco.csv)
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
