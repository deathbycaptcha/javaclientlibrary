asyncapi: '2.6.0'
info:
  title: DeathByCaptcha Socket API (Async/TCP description)
  version: '1.0.0'
  description: |
    AsyncAPI/TCP description of the DeathByCaptcha socket protocol. This
    specification is provided primarily for AI agents and automated
    tooling that need to understand or generate socket clients in any
    language. Messages are JSON objects terminated with CRLF. Clients send
    commands with `cmd` and the server replies with JSON response objects.
    See also the JSON-LD contexts (`spec/jsonld/socket_context.jsonld`) and
    the HTTP manifest (`spec/metadata/api_manifest.jsonld`) for complementary
    machine-readable summaries.
servers:
  dbc-tcp:
    url: api.dbcapi.me:8123
    protocol: tcp
    description: |
      TCP socket server on ports 8123–8130. Plain TCP protocol (unencrypted) optimized for
      performance-critical integrations. Official client libraries available in multiple languages.

      **Security Warning:** Credentials are sent in cleartext. Use ONLY in trusted networks
      (corporate intranets, VPCs, internal microservices). For public internet or untrusted
      networks, use the HTTPS HTTP API instead (encrypted by default).

      If you need socket API through untrusted networks, tunnel through SSH/VPN before connecting.
      See https://deathbycaptcha.com/api for official client code examples.
channels:
  socket:
    description: Single bidirectional TCP channel; client publishes requests and subscribes to responses.
    publish:
      summary: Messages sent by client to server
      message:
        $ref: '#/components/messages/DbcCommand'
    subscribe:
      summary: Messages sent by server to client
      message:
        $ref: '#/components/messages/DbcResponse'
components:
  messages:
    DbcCommand:
      name: DbcCommand
      payload:
        type: object
        required: [cmd, version]
        properties:
          cmd:
            type: string
            description: Command name (login, upload, captcha, report, user)
          version:
            type: string
          username:
            type: string
          password:
            type: string
          authtoken:
            type: string
          captcha:
            type: integer
          # upload variant: base64 image string
          captcha_base64:
            type: string
          type:
            type: integer
          token_params:
            type: object
        examples:
          login:
            summary: Login command
            payload:
              cmd: login
              version: DBC/Python v1
              username: your_user
              password: your_pass
          upload_base64:
            summary: Upload command (base64 image)
            payload:
              cmd: upload
              version: DBC/Python v1
              captcha_base64: "<base64string>"
              type: 0
          upload_token:
            summary: Upload token-based captcha (reCAPTCHA token)
            payload:
              cmd: upload
              version: DBC/Python v1
              type: 4
              token_params:
                proxy: "http://127.0.0.1:3128"
                proxytype: "HTTP"
                googlekey: "6Le-wvkSAAAA..."
                pageurl: "http://test.com/path_with_recaptcha"
    DbcResponse:
      name: DbcResponse
      payload:
        type: object
        description: |
          Generic response object. Depending on the command the server may include
          additional fields such as `user`, `rate`, `balance` and `is_banned` after
          a `login` or `user` request. Responses for captcha-related commands
          always include `captcha` (id), `text` (solution or empty string),
          `is_correct` and `status`.
        properties:
          error:
            type: string
            description: Error message if the command failed
          status:
            type: integer
            description: Status code (0 for success, 255 for errors such as unknown-command)
          captcha:
            type: integer
          text:
            type: string
            nullable: true
          is_correct:
            type: boolean
            description: Whether the captcha is/was correct (true/false)
        additionalProperties: true
        examples:
          solved:
            payload:
              captcha: 12345
              text: solved-text
              is_correct: true
              status: 0
          pending:
            payload:
              captcha: 12345
              text: null
              is_correct: false
              status: 0
          login:
            payload:
              user: 6789
              rate: 0.25
              balance: 12.34
              is_banned: false
              status: 0
          error_example:
            payload:
              error: not-logged-in
              captcha: 0
              status: 255

  schemas:
    TokenParams:
      type: object
      properties:
        proxy:
          type: string
        proxytype:
          type: string
        googlekey:
          type: string
        pageurl:
          type: string
        action:
          type: string
        min_score:
          type: number
      example:
        proxy: "http://127.0.0.1:3128"
        proxytype: "HTTP"
        googlekey: "6Le-wvkSAAAA..."
        pageurl: "http://test.com/path_with_recaptcha"
        action: "login"
        min_score: 0.3
x-bindings:
  tcp:
    framing: crlf
    note: Messages are JSON text followed by CRLF; clients should read until CRLF.
