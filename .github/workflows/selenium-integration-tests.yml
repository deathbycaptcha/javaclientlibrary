name: Selenium Integration Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  selenium-integration-tests:
    name: Selenium Integration Tests (Java 25)
    runs-on: ubuntu-latest

    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}
      DBC_AUTHTOKEN: ${{ secrets.DBC_AUTHTOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install Firefox and GeckoDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          if ! command -v geckodriver >/dev/null 2>&1; then
            sudo apt-get install -y firefox-geckodriver || sudo apt-get install -y geckodriver
          fi
          firefox --version
          geckodriver --version

      - name: Run Selenium integration test
        run: mvn --batch-mode --errors --fail-at-end --show-version -Djava.release=25 -Dtest=OnlineSeleniumRecaptchaIntegrationTest test

      - name: Upload Selenium integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-integration-test-results
          path: target/surefire-reports/
